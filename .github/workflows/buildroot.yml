name: Build Buildroot Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Fix AppArmor permissions
      run: sudo apt install apparmor-profiles && sudo ln -s /usr/share/apparmor/extra-profiles/bwrap-userns-restrict /etc/apparmor.d/bwrap && sudo apparmor_parser /etc/apparmor.d/bwrap
  
    - uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}

    - uses: nicknovitski/nix-develop@v1

    - uses: DeterminateSystems/magic-nix-cache-action@main

    - name: Check nix flake
      run: nix flake check

    - name: Build image
      run: cd output/amtrak_midwest_test && make
